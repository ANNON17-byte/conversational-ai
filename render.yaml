services:
  - type: web
    name: ai-dashboard-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed_data.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./dashboard.db
      - key: FRONTEND_URL
        sync: false
    rootDir: backend
